name: Update Prices (Yuyutei)

on:
  workflow_dispatch:
    inputs:
      set_code:
        description: "Optional: specific set code to reprice (leave empty for all)"
        required: false
  schedule:
    - cron: "0 6 * * 1"      # Every Monday 6am UTC

jobs:
  reprice:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape Yuyutei prices + re-merge
        run: python3 functions/reprice.py ${{ inputs.set_code }}

      - name: Run Shopify export
        run: python3 functions/shopify_export.py

      - name: Send CSVs to Telegram
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: "-1003827231189"
        run: |
          for f in data/cards_final.csv data/cards_unmatched.csv data/shopify_products.csv; do
            [ -s "$f" ] && curl -s -F chat_id="$CHAT_ID" \
              -F document=@"$f" \
              -F caption="$(basename $f) — $(wc -l < $f) lines" \
              "https://api.telegram.org/bot${TOKEN}/sendDocument" || true
          done

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/cards_yyt_price.csv \
            data/cards_final.csv \
            data/shopify_products.csv
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update prices [skip ci]" && git push
